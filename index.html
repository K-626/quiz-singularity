<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズ問題一括登録（管理者用）</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 640px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            color: #2c3e50;
        }

        h2 {
            font-size: 16px;
            color: #555;
            margin-top: 0;
        }

        .file-input-area {
            border: 2px dashed #3498db;
            padding: 30px;
            text-align: center;
            background: #ecf0f1;
            border-radius: 8px;
            margin: 20px 0;
            cursor: pointer;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 18px;
            color: white;
            background-color: #2ecc71;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn-secondary {
            background-color: #3498db;
            font-size: 15px;
            padding: 10px;
        }

        .btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
        }

        .status.success { background: #eafaf1; color: #2ecc71; }
        .status.error   { background: #fdf2f2; color: #e74c3c; }
        .status.info    { background: #eaf4fb; color: #2980b9; }

        .format-info {
            background: #fffde7;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            border: 1px solid #fff59d;
            margin-bottom: 20px;
        }

        .error-detail {
            margin-top: 10px;
            font-size: 13px;
            font-family: monospace;
            background: #fff0f0;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #f5c6c6;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 10px;
        }

        .preview-table th {
            background: #3498db;
            color: white;
            padding: 6px 10px;
            text-align: left;
        }

        .preview-table td {
            padding: 6px 10px;
            border-bottom: 1px solid #eee;
        }

        .preview-table tr:nth-child(even) td { background: #f9f9f9; }
    </style>
</head>

<body>

    <!-- 接続テスト -->
    <div class="card">
        <h2>🔌 Step 1: Supabase 接続テスト</h2>
        <button class="btn btn-secondary" onclick="testConnection()">接続テストを実行する</button>
        <div id="test-msg" class="status" style="display:none;"></div>
        <div id="test-detail" class="error-detail"></div>
    </div>

    <!-- CSV登録 -->
    <div class="card">
        <h1>クイズ問題 一括CSV登録</h1>

        <div class="format-info">
            <strong>【CSVファイルの形式】</strong><br>
            Excel等で作成し、必ず<strong>UTF-8形式のCSV</strong>で保存してください。<br>
            1行目はヘッダー（問題文,答え）として読み飛ばします。<br>
            <br>
            <code>
            問題文,答え<br>
            日本で一番高い山は？,富士山<br>
            日本の首都はどこ？,東京
            </code>
        </div>

        <div class="file-input-area" onclick="document.getElementById('csv-file').click()">
            <p>ここをクリックしてCSVファイルを選択</p>
            <input type="file" id="csv-file" accept=".csv" style="display:none;" onchange="handleFileSelect()">
            <div id="file-name" style="color: #3498db; font-weight: bold;"></div>
        </div>

        <!-- プレビュー -->
        <div id="preview-area" style="display:none; margin-bottom: 15px;">
            <strong>📋 読み込みプレビュー（最初の5件）</strong>
            <div id="preview-table-container"></div>
            <div id="preview-count" style="font-size:13px; color:#777; margin-top:5px;"></div>
        </div>

        <button id="upload-btn" class="btn" onclick="uploadCSV()" disabled>登録を実行する</button>

        <div id="status-msg" class="status" style="display:none;"></div>
        <div id="error-detail" class="error-detail"></div>
    </div>

    <script>
        // --- Supabaseの接続設定 ---
        const SUPABASE_URL = 'https://ogejvelyldxffbljzgav.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nZWp2ZWx5bGR4ZmZibGp6Z2F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzcwOTEsImV4cCI6MjA5NzAxMzA5MX0.mo0l3aEgR3gkc-6_2p3_O1WHISxN2tB9ooUFfyDkQXY';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let parsedQuizData = [];

        // ---- 接続テスト ----
        async function testConnection() {
            const msg = document.getElementById('test-msg');
            const detail = document.getElementById('test-detail');
            msg.className = 'status info';
            msg.style.display = 'block';
            msg.innerText = '接続テスト中...';
            detail.style.display = 'none';

            try {
                const { data, error } = await supabaseClient.from('quizzes').select('id').limit(1);
                if (error) {
                    msg.className = 'status error';
                    msg.innerText = '❌ 接続エラー';
                    detail.style.display = 'block';
                    detail.innerText =
                        `code: ${error.code || 'なし'}\n` +
                        `message: ${error.message || 'なし'}\n` +
                        `details: ${error.details || 'なし'}\n` +
                        `hint: ${error.hint || 'なし'}`;
                } else {
                    msg.className = 'status success';
                    msg.innerText = `✅ 接続成功！quizzes テーブルに接続できました。現在 ${data.length} 件確認。`;
                }
            } catch (e) {
                msg.className = 'status error';
                msg.innerText = '❌ 例外エラー（ネットワークまたはSDK）';
                detail.style.display = 'block';
                detail.innerText = e.toString();
            }
        }

        // ---- ファイル選択 ----
        function handleFileSelect() {
            const fileInput = document.getElementById('csv-file');
            const fileNameDiv = document.getElementById('file-name');
            const uploadBtn = document.getElementById('upload-btn');
            const previewArea = document.getElementById('preview-area');

            parsedQuizData = [];
            previewArea.style.display = 'none';
            uploadBtn.disabled = true;

            if (fileInput.files.length === 0) {
                fileNameDiv.innerText = '';
                return;
            }

            const file = fileInput.files[0];
            fileNameDiv.innerText = `選択中: ${file.name}`;

            const reader = new FileReader();
            reader.onload = function (e) {
                const text = e.target.result;
                const lines = text.split(/\r?\n/);

                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    const columns = line.split(',');
                    if (columns.length >= 2) {
                        const question = columns[0].trim();
                        const answer = columns[1].trim();
                        if (question && answer) {
                            parsedQuizData.push({ question, answer });
                        }
                    }
                }

                if (parsedQuizData.length === 0) {
                    showStatus('status-msg', 'error', '有効なデータが見つかりません。CSVの形式を確認してください。');
                    return;
                }

                // プレビュー表示
                showPreview(parsedQuizData);
                uploadBtn.disabled = false;
            };
            reader.readAsText(file, 'UTF-8');
        }

        function showPreview(data) {
            const previewArea = document.getElementById('preview-area');
            const container = document.getElementById('preview-table-container');
            const countDiv = document.getElementById('preview-count');

            const preview = data.slice(0, 5);
            let html = '<table class="preview-table"><thead><tr><th>#</th><th>問題文</th><th>答え</th></tr></thead><tbody>';
            preview.forEach((row, i) => {
                html += `<tr><td>${i + 1}</td><td>${escapeHtml(row.question)}</td><td>${escapeHtml(row.answer)}</td></tr>`;
            });
            html += '</tbody></table>';

            container.innerHTML = html;
            countDiv.innerText = `合計 ${data.length} 件のデータを検出しました。`;
            previewArea.style.display = 'block';
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // ---- アップロード処理 ----
        async function uploadCSV() {
            if (parsedQuizData.length === 0) return;

            const uploadBtn = document.getElementById('upload-btn');
            const errorDetail = document.getElementById('error-detail');
            uploadBtn.disabled = true;
            errorDetail.style.display = 'none';

            showStatus('status-msg', 'info', `${parsedQuizData.length}件をデータベースに送信中...`);

            try {
                const { error } = await supabaseClient.from('quizzes').insert(parsedQuizData);

                if (error) {
                    showStatus('status-msg', 'error', `❌ 登録失敗`);
                    errorDetail.style.display = 'block';
                    errorDetail.innerText =
                        `code: ${error.code || 'なし'}\n` +
                        `message: ${error.message || 'なし'}\n` +
                        `details: ${error.details || 'なし'}\n` +
                        `hint: ${error.hint || 'なし'}`;
                    uploadBtn.disabled = false;
                } else {
                    showStatus('status-msg', 'success', `🎉 成功！ ${parsedQuizData.length}件のクイズを登録しました！`);
                    document.getElementById('csv-file').value = '';
                    document.getElementById('file-name').innerText = '';
                    document.getElementById('preview-area').style.display = 'none';
                    parsedQuizData = [];
                }
            } catch (e) {
                showStatus('status-msg', 'error', '❌ 例外エラーが発生しました');
                errorDetail.style.display = 'block';
                errorDetail.innerText = e.toString();
                uploadBtn.disabled = false;
            }
        }

        function showStatus(id, type, text) {
            const el = document.getElementById(id);
            el.className = `status ${type}`;
            el.style.display = 'block';
            el.innerText = text;
        }
    </script>
</body>

</html>
