<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイピング早押しクイズ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .start-btn {
            font-size: 18px;
            padding: 12px 24px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background-color: #3498db;
            color: white;
            transition: 0.2s;
        }

        .start-btn:hover {
            background-color: #2980b9;
        }

        .quiz-area {
            display: none;
            width: 100%;
        }

        .question-text {
            font-size: 22px;
            font-weight: bold;
            min-height: 80px;
            line-height: 1.5;
            text-align: left;
            width: 100%;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .action-btn {
            font-size: 24px;
            padding: 15px 40px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            margin: 0 auto 12px auto;
            display: block;
        }

        .action-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .result-area {
            display: none;
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }

        .answer-text {
            font-size: 24px;
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .judge-btns {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .judge-btns button {
            font-size: 20px;
            padding: 10px 30px;
            margin: 0 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }

        #btn-circle {
            background-color: #2ecc71;
        }

        #btn-cross {
            background-color: #95a5a6;
        }

        .status-msg {
            font-size: 16px;
            color: #7f8c8d;
            margin-top: 15px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .normal-badge {
            background-color: #3498db;
        }

        .q-badge {
            background-color: #e67e22;
        }
    </style>
</head>

<body>

    <h1>早押しタイピングクイズ</h1>

    <div class="card">
        <div id="start-screen" class="mode-selection">
            <button id="start-btn" class="start-btn" onclick="startQuiz()">ボタンを押す</button>
        </div>

        <div id="quiz-screen" class="quiz-area">
            <div id="question-box" class="question-text"></div>
            <button id="push-btn" class="action-btn" onclick="pressButton()">押す！</button>

            <div id="result-box" class="result-area">
                <div id="status-label" style="font-size: 18px; margin-bottom: 10px; font-weight: bold;"></div>
                <div style="font-size: 14px; color: #7f8c8d;">答え</div>
                <div id="answer-box" class="answer-text"></div>
                <div id="judge-section">
                    <div class="judge-btns">
                        <button id="btn-circle" onclick="submitResult(true)">〇</button>
                        <button id="btn-cross" onclick="submitResult(false)">×</button>
                    </div>
                </div>
            </div>
            <div id="info-msg" class="status-msg"></div>
        </div>
    </div>

    <script>
        // --- Supabaseの接続設定 ---
        // ※ URLは /rest/v1/ を除いたベースURLのみ指定すること
        const SUPABASE_URL = 'https://ogejvelyldxffbljzgav.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nZWp2ZWx5bGR4ZmZibGp6Z2F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzcwOTEsImV4cCI6MjA5NzAxMzA5MX0.mo0l3aEgR3gkc-6_2p3_O1WHISxN2tB9ooUFfyDkQXY';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 状態管理用変数 ---
        let currentMode = 'battle';
        let currentQuiz = null;
        let fullQuestion = "";
        let displayedQuestion = "";
        let charIndex = 0;
        let timerId = null;
        let isPressed = false;

        let pressedCountByPlayer = 0; // プレイヤーが押した時の文字数
        let npcPressCharIndex = -1;   // NPCが押す予定の文字数
        let winner = "";              // "player" or "npc"

        // タイピングの速度（ミリ秒単位 / 1文字ごと）
        const TYPING_SPEED = 150;
        const FALLBACK_QUIZZES = [
            { id: 'fallback-1', question: 'JavaScriptはブラウザで動く言語です', answer: 'JavaScript' },
            { id: 'fallback-2', question: 'HTMLは文書の骨組みを作る言語です', answer: 'HTML' },
            { id: 'fallback-3', question: 'CSSは見た目を整える言語です', answer: 'CSS' }
        ];

        // アプリ初期化
        function initApp() {
            document.getElementById('start-screen').style.display = 'block';
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-box').style.display = 'none';
            document.getElementById('push-btn').style.display = 'block';
            document.getElementById('push-btn').disabled = false;
            document.getElementById('judge-section').style.display = 'none';
            document.getElementById('info-msg').innerText = "";
            isPressed = false;
            winner = "";
        }

        // クイズ開始
        async function startQuiz() {
            // 状態をリセット
            isPressed = false;
            winner = "";
            pressedCountByPlayer = 0;
            npcPressCharIndex = -1;
            charIndex = 0;
            displayedQuestion = "";
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }

            currentMode = 'battle';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('result-box').style.display = 'none';
            document.getElementById('push-btn').style.display = 'block';
            document.getElementById('push-btn').disabled = false;
            document.getElementById('judge-section').style.display = 'none';
            document.getElementById('question-box').innerText = "読み込み中...";
            document.getElementById('info-msg').innerText = "";

            // 1. Supabaseからランダムに1問取得（失敗時はローカルの代替問題を使う）
            let quizzes = [];
            let fetchError = null;
            try {
                const result = await supabaseClient.from('quizzes').select('*');
                quizzes = result.data || [];
                fetchError = result.error;
            } catch (e) {
                fetchError = e;
            }

            if (fetchError || quizzes.length === 0) {
                currentQuiz = FALLBACK_QUIZZES[Math.floor(Math.random() * FALLBACK_QUIZZES.length)];
                document.getElementById('info-msg').innerText = 'Supabaseの取得に失敗したため、サンプル問題を使用します。';
            } else {
                currentQuiz = quizzes[Math.floor(Math.random() * quizzes.length)];
            }
            fullQuestion = currentQuiz.question;

            // 2. NPCの押しタイミングを計算
            document.getElementById('info-msg').innerText = 'NPC対戦中...';
            try {
                const { data: logs } = await supabaseClient
                    .from('play_logs')
                    .select('pressed_chars')
                    .eq('quiz_id', currentQuiz.id)
                    .eq('is_correct', true)
                    .gte('pressed_chars', 5)
                    .order('pressed_chars', { ascending: true })
                    .limit(1);

                if (logs && logs.length > 0) {
                    npcPressCharIndex = logs[0].pressed_chars;
                } else {
                    const randomFactor = Math.random() * (0.8 - 0.2) + 0.2;
                    npcPressCharIndex = Math.round(fullQuestion.length * randomFactor);
                }
            } catch (e) {
                const randomFactor = Math.random() * (0.8 - 0.2) + 0.2;
                npcPressCharIndex = Math.round(fullQuestion.length * randomFactor);
            }

            // 3. タイピングスタート
            document.getElementById('question-box').innerText = "";
            document.getElementById('info-msg').innerText = 'NPC対戦中...';

            timerId = setInterval(typewriterEffect, TYPING_SPEED);
        }

        // タイピングエフェクト処理
        function typewriterEffect() {
            if (charIndex < fullQuestion.length) {
                displayedQuestion += fullQuestion[charIndex];
                charIndex++;
                document.getElementById('question-box').innerText = displayedQuestion;

                // NPCの押しタイミングに達した場合
                if (charIndex >= npcPressCharIndex && !isPressed) {
                    clearInterval(timerId);
                    timerId = null;
                    npcPress();
                }
            } else {
                // 問題を最後まで読み終えた場合
                clearInterval(timerId);
                timerId = null;
                if (!isPressed) {
                    // 最後まで誰も押さなかった場合、NPCが文末で押したとみなす
                    npcPressCharIndex = fullQuestion.length;
                    npcPress();
                }
            }
        }

        // プレイヤーが「押す！」ボタンをクリックしたとき
        function pressButton() {
            if (isPressed) return;
            isPressed = true;
            clearInterval(timerId);
            timerId = null;

            pressedCountByPlayer = charIndex; // 押した時点の文字数を記録
            winner = "player";

            document.getElementById('push-btn').disabled = true;
            // プレイヤーが押した場合は〇×判定を表示
            document.getElementById('judge-section').style.display = 'flex';
            showAnswerArea('あなたが押しました。');
        }

        // NPCが先に押した場合の処理
        function npcPress() {
            if (isPressed) return; // 二重発火防止
            isPressed = true;
            winner = "npc";
            document.getElementById('push-btn').disabled = true;
            // NPCが押した場合は〇×判定を非表示（自動で次へ）
            document.getElementById('judge-section').style.display = 'none';
            showAnswerArea('NPCが先に押しました。');
            setTimeout(() => nextQuestion(), 2000);
        }

        // 答えを表示する共通処理
        function showAnswerArea(statusText) {
            document.getElementById('status-label').innerText = statusText || '';
            document.getElementById('answer-box').innerText = currentQuiz.answer;
            document.getElementById('result-box').style.display = 'block';
        }

        // 〇×ボタンが押されたとき
        async function submitResult(isCorrect) {
            document.getElementById('judge-section').style.display = 'none';

            // フォールバック問題の場合はDBへの保存をスキップ
            if (currentQuiz.id && !String(currentQuiz.id).startsWith('fallback')) {
                try {
                    const { error } = await supabaseClient
                        .from('play_logs')
                        .insert([{ quiz_id: currentQuiz.id, pressed_chars: pressedCountByPlayer, is_correct: isCorrect }]);

                    if (error) {
                        const reason = error.message || '不明なエラー';
                        const detail = error.code ? ` (code: ${error.code})` : '';
                        document.getElementById('info-msg').innerText = `データ保存に失敗しました。${reason}${detail}`;
                    } else {
                        document.getElementById('info-msg').innerText = '保存しました。';
                    }
                } catch (e) {
                    document.getElementById('info-msg').innerText = `保存エラー: ${e.message}`;
                }
            }

            setTimeout(() => nextQuestion(), 1000);
        }

        async function nextQuestion() {
            await startQuiz();
        }

        // 初期起動
        window.onload = initApp;
    </script>
</body>

</html>
