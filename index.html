<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早押しクイズ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .start-btn {
            font-size: 18px;
            padding: 12px 24px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background-color: #3498db;
            color: white;
            transition: 0.2s;
        }
        .start-btn:hover { background-color: #2980b9; }

        /* キーコンフィグ用のスタイル */
        .config-section {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            width: 100%;
            box-sizing: border-box;
        }
        .config-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #4a5568;
        }
        .config-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .config-btn {
            background: white;
            border: 1px solid #cbd5e0;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            min-width: 80px;
            transition: background-color 0.2s;
        }
        .config-btn.waiting {
            background: #feebc8;
            border-color: #fbd38d;
            color: #c05621;
        }

        .quiz-area { display: none; width: 100%; }
        .question-text {
            font-size: 22px;
            font-weight: bold;
            min-height: 80px;
            line-height: 1.5;
            text-align: left;
            width: 100%;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .action-btn {
            font-size: 20px;
            padding: 15px 40px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            margin: 0 auto 12px auto;
            display: block;
            transition: background-color 0.2s;
        }
        .action-btn.show-answer-mode {
            background-color: #3498db; /* 回答表示モード時は青色に */
            cursor: pointer;
        }
        .action-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; box-shadow: none; }
        
        .judge-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }
        .judge-btns button {
            font-size: 24px;
            padding: 12px 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: transform 0.1s;
        }
        .judge-btns button:active {
            transform: scale(0.95);
        }
        #btn-circle { background-color: #2ecc71; }
        #btn-cross { background-color: #e74c3c; }
        
        .answer-text { font-size: 28px; color: #2c3e50; font-weight: bold; margin-bottom: 20px; }
        .status-msg { font-size: 16px; color: #7f8c8d; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>早押しタイピングクイズ</h1>
    
    <div class="card">
        <div id="start-screen" class="mode-selection">
            <div class="config-section">
                <div class="config-title">⌨️ キーボード早押し設定</div>
                <div class="config-row">
                    <div>
                        <span style="font-size: 14px; margin-right: 5px;">プレイヤー1:</span>
                        <button id="config-p1-btn" class="config-btn" onclick="startKeyConfig('p1')">F</button>
                    </div>
                    <div>
                        <span style="font-size: 14px; margin-right: 5px;">プレイヤー2:</span>
                        <button id="config-p2-btn" class="config-btn" onclick="startKeyConfig('p2')">J</button>
                    </div>
                </div>
            </div>
            <button id="start-btn" class="start-btn" onclick="startQuiz()">ボタンにつく</button>
        </div>

        <div id="quiz-screen" class="quiz-area">
            <div id="question-box" class="question-text"></div>
            
            <div id="status-label" style="font-size: 18px; margin-bottom: 15px; font-weight: bold; min-height: 27px;"></div>
            
            <button id="push-btn" class="action-btn" onclick="handlePushBtnClick()"></button>

            <div id="judge-section" style="display: none; width: 100%;">
                <div class="judge-btns">
                    <button id="btn-circle" onclick="submitResult(true)">〇</button>
                    <button id="btn-cross" onclick="submitResult(false)">×</button>
                </div>
            </div>

            <div id="answer-area" style="display: none; margin-top: 25px; width: 100%;">
                <div style="font-size: 14px; color: #7f8c8d; margin-bottom: 5px;">答え</div>
                <div id="answer-box" class="answer-text"></div>
            </div>
            
            <div id="info-msg" class="status-msg"></div>
        </div>
    </div>

    <script>
        // --- Supabaseの接続設定 ---
        const SUPABASE_URL = 'https://ogejvelyldxffbljzgav.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nZWp2ZWx5bGR4ZmZibGp6Z2F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzcwOTEsImV4cCI6MjA5NzAxMzA5MX0.mo0l3aEgR3gkc-6_2p3_O1WHISxN2tB9ooUFfyDkQXY';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 状態管理用変数 ---
        let currentMode = 'battle';
        let currentQuiz = null;
        let fullQuestion = "";
        let displayedQuestion = "";
        let charIndex = 0;
        let timerId = null;
        let isPressed = false;
        
        let pressedCountByPlayer = 0; // プレイヤーが押した時の文字数
        let npcPressCharIndex = -1;   // NPCが押す予定の文字数
        let winner = "";              // "player1", "player2", "npc"
        let buttonState = 'push';     // 'push' (早押し中), 'show_answer' (回答を表示), 'none' (無効)

        // キーコンフィグ用
        let p1Key = 'f';
        let p2Key = 'j';
        let configuringPlayer = null; // 'p1' or 'p2' or null

        // タイピングの速度（ミリ秒単位 / 1文字ごと）
        const TYPING_SPEED = 150;
        const FALLBACK_QUIZZES = [
            { id: 'fallback-1', question: 'JavaScriptはブラウザで動く言語です', answer: 'JavaScript' },
            { id: 'fallback-2', question: 'HTMLは文書の骨組みを作る言語です', answer: 'HTML' },
            { id: 'fallback-3', question: 'CSSは見た目を整える言語です', answer: 'CSS' }
        ];

        // 表示用のキー名整形（スペースキー対策）
        function getKeyDisplayName(key) {
            if (key === ' ') return 'SPACE';
            return key.toUpperCase();
        }

        // キーコンフィグ開始
        function startKeyConfig(player) {
            configuringPlayer = player;
            const btn = document.getElementById(`config-${player}-btn`);
            btn.innerText = 'キー入力待ち...';
            btn.classList.add('waiting');
        }

        // キーボードイベントの制御
        window.addEventListener('keydown', function(e) {
            // 1. キーコンフィグ中の処理
            if (configuringPlayer) {
                e.preventDefault();
                const targetKey = e.key.toLowerCase();
                
                if (configuringPlayer === 'p1') {
                    p1Key = targetKey;
                    document.getElementById('config-p1-btn').innerText = getKeyDisplayName(e.key);
                    document.getElementById('config-p1-btn').classList.remove('waiting');
                } else if (configuringPlayer === 'p2') {
                    p2Key = targetKey;
                    document.getElementById('config-p2-btn').innerText = getKeyDisplayName(e.key);
                    document.getElementById('config-p2-btn').classList.remove('waiting');
                }
                configuringPlayer = null;
                return;
            }

            // 2. クイズ中の早押し判定
            if (timerId && !isPressed && buttonState === 'push') {
                const pressedKey = e.key.toLowerCase();
                if (pressedKey === p1Key.toLowerCase()) {
                    e.preventDefault();
                    pressButton('player1');
                } else if (pressedKey === p2Key.toLowerCase()) {
                    e.preventDefault();
                    pressButton('player2');
                }
            } 
            // 3. 誰かが押した後の「回答を表示」ショートカット
            else if (isPressed && buttonState === 'show_answer') {
                const pressedKey = e.key.toLowerCase();
                // 押した本人のキー、もしくはもう片方のキーでも回答表示に進めるようにする
                if (pressedKey === p1Key.toLowerCase() || pressedKey === p2Key.toLowerCase()) {
                    e.preventDefault();
                    showAnswer();
                }
            }
        });

        // アプリ初期化
        function initApp() {
            document.getElementById('start-screen').style.display = 'block';
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('answer-area').style.display = 'none';
            document.getElementById('judge-section').style.display = 'none';
            document.getElementById('status-label').innerText = "";
            document.getElementById('info-msg').innerText = "";
            
            document.getElementById('config-p1-btn').innerText = getKeyDisplayName(p1Key);
            document.getElementById('config-p2-btn').innerText = getKeyDisplayName(p2Key);
            
            const pushBtn = document.getElementById('push-btn');
            pushBtn.style.display = 'block';
            pushBtn.disabled = true; // 早押し中はキーボード専用にするため無効化
            pushBtn.className = "action-btn";
            
            isPressed = false;
            winner = "";
            buttonState = 'push';
        }

        // クイズ開始
        async function startQuiz() {
            isPressed = false;
            winner = "";
            pressedCountByPlayer = 0;
            npcPressCharIndex = -1;
            charIndex = 0;
            displayedQuestion = "";
            buttonState = 'push';
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }

            currentMode = 'battle';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            
            document.getElementById('answer-area').style.display = 'none';
            document.getElementById('judge-section').style.display = 'none';
            document.getElementById('status-label').innerText = "";
            document.getElementById('info-msg').innerText = "";

            const pushBtn = document.getElementById('push-btn');
            pushBtn.style.display = 'block';
            pushBtn.disabled = true; // 早押しはキーボード操作のみ
            pushBtn.innerText = `キーを叩け！ (P1: ${getKeyDisplayName(p1Key)} / P2: ${getKeyDisplayName(p2Key)})`;
            pushBtn.className = "action-btn";

            document.getElementById('question-box').innerText = "読み込み中...";

            // 1. Supabaseからランダムに1問取得
            let quizzes = [];
            let fetchError = null;
            try {
                const result = await supabaseClient.from('quizzes').select('*');
                quizzes = result.data || [];
                fetchError = result.error;
            } catch (e) {
                fetchError = e;
            }

            if (fetchError || quizzes.length === 0) {
                currentQuiz = FALLBACK_QUIZZES[Math.floor(Math.random() * FALLBACK_QUIZZES.length)];
                document.getElementById('info-msg').innerText = 'Supabaseの取得に失敗したため、サンプル問題を使用します。';
            } else {
                currentQuiz = quizzes[Math.floor(Math.random() * quizzes.length)];
            }
            fullQuestion = currentQuiz.question;
            
            // 2. NPCの押しタイミングを計算
            document.getElementById('info-msg').innerText = 'NPC（CPU）も参戦中...';
            try {
                const { data: logs } = await supabaseClient
                    .from('play_logs')
                    .select('pressed_chars')
                    .eq('quiz_id', currentQuiz.id)
                    .eq('is_correct', true)
                    .gte('pressed_chars', 5)
                    .order('pressed_chars', { ascending: true })
                    .limit(1);

                if (logs && logs.length > 0) {
                    npcPressCharIndex = logs[0].pressed_chars;
                } else {
                    const randomFactor = Math.random() * (0.8 - 0.2) + 0.2;
                    npcPressCharIndex = Math.round(fullQuestion.length * randomFactor);
                }
            } catch (e) {
                const randomFactor = Math.random() * (0.8 - 0.2) + 0.2;
                npcPressCharIndex = Math.round(fullQuestion.length * randomFactor);
            }

            // 3. タイピングスタート
            document.getElementById('question-box').innerText = "";
            timerId = setInterval(typewriterEffect, TYPING_SPEED);
        }

        // タイピングエフェクト処理
        function typewriterEffect() {
            if (charIndex < fullQuestion.length) {
                displayedQuestion += fullQuestion[charIndex];
                charIndex++;
                document.getElementById('question-box').innerText = displayedQuestion;

                // NPCの押しタイミングに達した場合
                if (charIndex >= npcPressCharIndex && !isPressed) {
                    clearInterval(timerId);
                    timerId = null;
                    npcPress();
                }
            } else {
                // 問題を最後まで読み終えた場合
                clearInterval(timerId);
                timerId = null;
                if (!isPressed) {
                    // 最後まで誰も押さなかった場合、NPCが文末で押したとみなす
                    npcPressCharIndex = fullQuestion.length;
                    npcPress();
                }
            }
        }

        // マウスで画面上のアクションボタンがクリックされた時の処理振り分け
        function handlePushBtnClick() {
            if (buttonState === 'show_answer') {
                showAnswer();
            }
        }

        // プレイヤーがキーボードを叩いたとき
        function pressButton(player) {
            if (isPressed) return;
            isPressed = true;
            clearInterval(timerId);
            timerId = null;
            
            pressedCountByPlayer = charIndex; // 押した時点の文字数を記録
            winner = player;

            const playerName = player === 'player1' ? 'プレイヤー1' : 'プレイヤー2';
            document.getElementById('status-label').innerText = `【${playerName}】が押しました！回答してください。`;
            
            // ボタンをマウスでもクリック可能な「回答を表示」モードに変更
            const pushBtn = document.getElementById('push-btn');
            pushBtn.disabled = false;
            pushBtn.innerText = "回答を表示 (または早押しキー)";
            pushBtn.classList.add('show-answer-mode');
            buttonState = 'show_answer';
        }

        // 「回答を表示」を実行したとき
        function showAnswer() {
            buttonState = 'none';
            
            // 回答表示ボタンを非表示にする
            document.getElementById('push-btn').style.display = 'none';

            // 答えを表示
            document.getElementById('answer-box').innerText = currentQuiz.answer;
            document.getElementById('answer-area').style.display = 'block';

            // 誰の判定かをわかりやすくラベル更新
            const playerName = winner === 'player1' ? 'プレイヤー1' : 'プレイヤー2';
            document.getElementById('status-label').innerText = `【${playerName}】の自己申告判定`;

            // 〇×判定を表示
            document.getElementById('judge-section').style.display = 'block';
        }

        // NPCが先に押した場合の処理
        function npcPress() {
            if (isPressed) return; 
            isPressed = true;
            winner = "npc";
            
            document.getElementById('push-btn').style.display = '
