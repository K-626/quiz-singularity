<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイピング早押しクイズ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .mode-selection button {
            font-size: 18px;
            padding: 12px 24px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background-color: #3498db;
            color: white;
            transition: 0.2s;
        }
        .mode-selection button:hover { background-color: #2980b9; }
        #q-mode-btn { background-color: #e67e22; }
        #q-mode-btn:hover { background-color: #d35400; }

        .quiz-area { display: none; width: 100%; }
        .question-text {
            font-size: 22px;
            font-weight: bold;
            min-height: 80px;
            line-height: 1.5;
            text-align: left;
            width: 100%;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .action-btn {
            font-size: 24px;
            padding: 15px 40px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .action-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        .result-area { display: none; margin-top: 20px; }
        .answer-text { font-size: 24px; color: #2c3e50; font-weight: bold; margin-bottom: 20px; }
        
        .judge-btns button {
            font-size: 20px;
            padding: 10px 30px;
            margin: 0 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }
        #btn-circle { background-color: #2ecc71; }
        #btn-cross { background-color: #95a5a6; }
        
        .status-msg { font-size: 16px; color: #7f8c8d; margin-top: 15px; }
        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .normal-badge { background-color: #3498db; }
        .q-badge { background-color: #e67e22; }
    </style>
</head>
<body>

    <h1>早押しタイピングクイズ</h1>
    
    <div class="card">
        <div id="mode-screen" class="mode-selection">
            <p>どちらのモードで遊びますか？</p>
            <button id="normal-mode-btn" onclick="startQuiz('normal')">通常モード (データ提供)</button>
            <button id="q-mode-btn" onclick="startQuiz('q')">Qモード (最速NPCと対戦)</button>
        </div>

        <div id="quiz-screen" class="quiz-area">
            <div id="mode-badge" class="badge"></div>
            <div id="question-box" class="question-text"></div>
            <button id="push-btn" class="action-btn" onclick="pressButton()">押す！</button>

            <div id="result-box" class="result-area">
                <div id="status-label" style="font-size: 18px; margin-bottom: 10px; font-weight: bold;"></div>
                <div style="font-size: 14px; color: #7f8c8d;">正解は：</div>
                <div id="answer-box" class="answer-text"></div>
                
                <div id="judge-section">
                    <p>あなたのボタンを押したタイミングは正解（〇）でしたか？</p>
                    <div class="judge-btns">
                        <button id="btn-circle" onclick="submitResult(true)">〇 (正解)</button>
                        <button id="btn-cross" onclick="submitResult(false)">× (不正解)</button>
                    </div>
                </div>
                <button id="next-btn" style="display:none; margin-top:15px; padding:10px 20px;" onclick="initApp()">次の問題 / モード選択へ</button>
            </div>
            <div id="info-msg" class="status-msg"></div>
        </div>
    </div>

    <script>
        // --- Supabaseの接続設定 ---
        // ※ご自身のSupabaseのURLとAnon Keyに書き換えてください
        const SUPABASE_URL = 'https://ogejvelyldxffbljzgav.supabase.co/rest/v1/';
        const SUPABASE_ANON_KEY = 'sb_publishable_iZrJGTwgJ-dju3OikWl0mQ_nXV9o915';
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 状態管理用変数 ---
        let currentMode = 'normal'; // 'normal' or 'q'
        let currentQuiz = null;
        let fullQuestion = "";
        let displayedQuestion = "";
        let charIndex = 0;
        let timerId = null;
        let isPressed = false;
        
        let pressedCountByPlayer = 0; // プレイヤーが押した時の文字数
        let npcPressCharIndex = -1;  // NPCが押す予定の文字数
        let winner = "";             // "player" or "npc"

        // タイピングの速度（ミリ秒単位 / 1文字ごと）
        const TYPING_SPEED = 150; 

        // アプリ初期化
        function initApp() {
            document.getElementById('mode-screen').style.display = 'block';
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-box').style.display = 'none';
            document.getElementById('push-btn').style.display = 'block';
            document.getElementById('push-btn').disabled = false;
            document.getElementById('judge-section').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('info-msg').innerText = "";
            isPressed = false;
            winner = "";
        }

        // クイズ開始
        const startQuiz = async (mode) => {
            currentMode = mode;
            document.getElementById('mode-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            
            const badge = document.getElementById('mode-badge');
            if(mode === 'normal') {
                badge.innerText = "通常モード (データ収集中)";
                badge.className = "badge normal-badge";
            } else {
                badge.innerText = "Qモード (過去の最速NPCと対戦)";
                badge.className = "badge q-badge";
            }

            document.getElementById('question-box').innerText = "読み込み中...";

            // 1. Supabaseからランダムに1問取得
            const { data: quizzes, error } = await supabase.from('quizzes').select('*');
            if (error || quizzes.length === 0) {
                document.getElementById('question-box').innerText = "問題の取得に失敗しました。";
                return;
            }
            currentQuiz = quizzes[Math.floor(Math.random() * quizzes.length)];
            fullQuestion = currentQuiz.question;
            
            // 2. Qモードの場合、NPCが押すタイミングを計算
            if (currentMode === 'q') {
                document.getElementById('info-msg').innerText = "NPC思考中...";
                // 過去の「5文字以上」で「〇（正解）」だった最速（最小文字数）のログを1件取得
                const { data: logs, error: logErr } = await supabase
                    .from('play_logs')
                    .select('pressed_chars')
                    .eq('quiz_id', currentQuiz.id)
                    .eq('is_correct', true)
                    .gte('pressed_chars', 5)
                    .order('pressed_chars', { ascending: true })
                    .limit(1);

                if (logs && logs.length > 0) {
                    // 過去データが存在する場合、その最速文字数で押させる
                    npcPressCharIndex = logs[0].pressed_chars;
                } else {
                    // 過去データがない場合：問題文の長さ × (0.2〜0.8の乱数) ※四捨五入
                    const randomFactor = Math.random() * (0.8 - 0.2) + 0.2;
                    npcPressCharIndex = Math.round(fullQuestion.length * randomFactor);
                }
            }

            // 3. タイピングスタート
            charIndex = 0;
            displayedQuestion = "";
            document.getElementById('question-box').innerText = "";
            document.getElementById('info-msg').innerText = currentMode === 'q' ? "NPC対戦中..." : "";
            
            timerId = setInterval(typewriterEffect, TYPING_SPEED);
        };

        // タイピングエフェクト処理
        function typewriterEffect() {
            if (charIndex < fullQuestion.length) {
                displayedQuestion += fullQuestion[charIndex];
                charIndex++;
                document.getElementById('question-box').innerText = displayedQuestion;

                // Qモード時：NPCの押しタイミングに達した場合
                if (currentMode === 'q' && charIndex === npcPressCharIndex && !isPressed) {
                    clearInterval(timerId);
                    npcPress();
                }
            } else {
                // 問題を最後まで読み終えた場合
                clearInterval(timerId);
                if (currentMode === 'q' && !isPressed) {
                    // NPCも押さず最後まで来たら、NPCは文末(総文字数)のタイミングで押したとみなす
                    npcPressCharIndex = fullQuestion.length;
                    npcPress();
                }
            }
        }

        // プレイヤーが「押す！」ボタンをクリックしたとき
        function pressButton() {
            if (isPressed) return;
            isPressed = true;
            clearInterval(timerId);
            
            pressedCountByPlayer = charIndex; // 押した時点の文字数を記録
            winner = "player";

            document.getElementById('push-btn').disabled = true;
            showAnswerArea(`あなたが ${pressedCountByPlayer} 文字目でボタンを押しました！`);
        }

        // NPCが先に押した場合の処理
        function npcPress() {
            isPressed = true;
            winner = "npc";
            document.getElementById('push-btn').disabled = true;
            showAnswerArea(`NPCが ${npcPressCharIndex} 文字目で先にボタンを押しました！`);
            
            // NPCが先に押した＝プレイヤーの負けなので、〇×自己申告はスキップ
            document.getElementById('judge-section').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        }

        // 答えを表示する共通処理
        function showAnswerArea(statusText) {
            document.getElementById('status-label').innerText = statusText;
            document.getElementById('answer-box').innerText = currentQuiz.answer;
            document.getElementById('result-box').style.display = 'block';
        }

        // 〇×ボタンが押されたとき（通常モード、または自分が先に押したQモード）
        async function submitResult(isCorrect) {
            document.getElementById('judge-section').style.display = 'none';
            
            // 通常モード、かつ 〇（正解）だった場合のみデータを保存
            if (currentMode === 'normal' && isCorrect) {
                if (pressedCountByPlayer < 5) {
                    document.getElementById('info-msg').innerText = "※5文字未満での検知のため、データは除外（保存されません）されました。";
                } else {
                    document.getElementById('info-msg').innerText = "データを送信中...";
                    
                    // Supabaseへインサート
                    const { error } = await supabase
                        .from('play_logs')
                        .insert([
                            { 
                                quiz_id: currentQuiz.id, 
                                pressed_chars: pressedCountByPlayer, 
                                is_correct: true 
                            }
                        ]);

                    if (error) {
                        document.getElementById('info-msg').innerText = "データの保存に失敗しました。";
                    } else {
                        document.getElementById('info-msg').innerText = `正解データを保存しました！（確定値: ${pressedCountByPlayer}文字）`;
                    }
                }
            } else if (currentMode === 'q' && winner === 'player') {
                if (isCorrect) {
                    document.getElementById('info-msg').innerText = "見事NPCより早く正解しました！あなたの勝ちです！";
                } else {
                    document.getElementById('info-msg').innerText = "あなたが先に押しましたが、不正解（×）のためあなたの負けです。";
                }
            }

            document.getElementById('next-btn').style.display = 'block';
        }

        // 初期起動
        window.onload = initApp;
    </script>
</body>
</html>
